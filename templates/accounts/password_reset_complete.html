{% extends "base.html" %}

{% block title %}Senha Alterada - LeadScout AI{% endblock %}

{% block content %}
<h1 class="mb-2 text-2xl font-extrabold tracking-tight text-white bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Senha alterada</h1>
<p class="text-sm text-slate-400">Sua senha foi redefinida com sucesso.</p>

<a href="{% url 'accounts:login' %}" class="relative group overflow-hidden rounded-lg p-[1px] w-full block mt-6 text-center">
    <span class="absolute inset-0 bg-gradient-to-r from-indigo-500 via-fuchsia-500 to-indigo-500 opacity-70 group-hover:opacity-100 transition-opacity duration-300"></span>
    <div class="relative bg-slate-950 px-4 py-3 rounded-[7px] flex items-center justify-center transition-all group-hover:bg-opacity-0">
        <span class="font-semibold text-white">Ir para o login</span>
    </div>
</a>
{% endblock %}
