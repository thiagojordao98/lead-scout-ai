{% extends "base.html" %}

{% block title %}E-mail enviado{% endblock %}

{% block content %}
<h1 class="mb-2 text-2xl font-bold">Verifique seu e-mail</h1>
<p class="text-sm text-slate-600">
    Se existir uma conta com o e-mail informado, enviamos um link para redefinir sua senha.
</p>
<a class="mt-6 inline-block text-sm font-medium text-blue-600 hover:underline" href="{% url 'accounts:login' %}">
    Voltar para login
</a>
{% endblock %}
