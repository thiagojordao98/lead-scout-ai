<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Recuperacao de senha</title>
</head>
<body style="font-family: Arial, sans-serif; color: #0f172a;">
    <h2>Recuperacao de senha</h2>
    <p>Ola, {{ email }}.</p>
    <p>Recebemos uma solicitacao para redefinir sua senha no {{ site_name }}.</p>
    <p>
        Clique no link abaixo para cadastrar uma nova senha:
    </p>
    <p>
        <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}">
            Redefinir minha senha
        </a>
    </p>
    <p>Se voce nao solicitou esta alteracao, ignore este e-mail.</p>
</body>
</html>
